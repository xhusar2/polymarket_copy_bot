services:
  copy_trader:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      STATE_FILE: /data/copy_state.json
      REDEEM_STATE_FILE: /data/redeem_state.json
      TRADE_LOG_FILE: /data/trade_log.jsonl
    volumes:
      - trader_state:/data

volumes:
  trader_state:
